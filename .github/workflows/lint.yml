name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: ruff check
        run: |
          uv run --no-project --with 'ruff>=0.6' --with-editable . \
            ruff check src/ tests/

      - name: ruff format --check
        run: |
          uv run --no-project --with 'ruff>=0.6' --with-editable . \
            ruff format --check src/ tests/

  mypy:
    name: mypy --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"

      - name: mypy
        run: |
          uv run --no-project --with 'mypy>=1.10' --with-editable . \
            mypy
