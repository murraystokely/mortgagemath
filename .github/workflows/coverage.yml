name: coverage

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Run pytest with coverage
        run: |
          uv run --no-project \
            --with pytest \
            --with pytest-cov \
            --with-editable . \
            pytest --cov=src/mortgagemath --cov-report=term --cov-report=xml -p no:cacheprovider

      - name: Generate coverage badge
        run: |
          uv run --no-project \
            --with 'genbadge[coverage]' \
            --with-editable . \
            genbadge coverage -i coverage.xml -o coverage.svg

      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          if git diff --staged --quiet; then
            echo "No coverage badge change."
          else
            git commit -m "ci: update coverage badge [skip ci]"
            git push
          fi
