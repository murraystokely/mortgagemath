# Worked example 4.3.4 from "Mathematics of Finance" (eCampus Ontario,
# CC BY-NC-SA) — a 15-year monthly-compounded mortgage.
#
# Textbook publishes:
#   - Loan: $308,000 at 4.62% APR, monthly compounding, 180 monthly payments
#   - Monthly payment: $2,375.11
#   - For payment 21: interest $1,090.80, principal $1,284.31
#   - Outstanding balance after payment 20: $283,323.39
#
# Library agrees on the monthly payment and on row 21's interest/principal
# (both round to the same cents). Library's balance after row 20 is
# $283,323.40 — a 1-cent drift from the textbook's $283,323.39, again
# because the textbook carries full balance precision rather than rounding
# the balance each month. The drift does not change row 21's printed
# interest because it absorbs into the cent-rounding.
#
# CSV is header-only; monthly_payment is the validated quantity.

[loan]
principal = "308000.00"
annual_rate = "4.62"
term_months = 180
day_count = "30/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "CA"
label = "ecampus_mathfinance_4_3_4"
url = "https://ecampusontario.pressbooks.pub/financemath/chapter/4-3-loan-amortization-formula-approach/"
notes = "Open textbook (CC BY-NC-SA). Carry-full-precision rounding causes 1-cent drift in cumulative balance vs library's round-each-balance algorithm."

[expected]
monthly_payment = "2375.11"
