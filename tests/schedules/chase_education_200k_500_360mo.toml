# Worked example from the Chase consumer-education page on loan
# amortization. Chase publishes a sample 30-year mortgage schedule with
# specific rows.
#
# Chase: $200,000 at 5% APR, 30 years, monthly payment $1,073.64.
# Library matches the payment under HALF_UP and reproduces rows 1, 2,
# and 3 exactly. The final row diverges because of cumulative
# rounding drift between Chase's schedule and the library's
# round-each-balance algorithm — Chase's schedule naturally winds down
# to a small residual at month 360, while the library's schedule
# adjusts its final payment to clear a larger residual.

[loan]
principal = "200000.00"
annual_rate = "5"
term_months = 360
day_count = "30/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "calculator"
country = "US"
label = "chase_education_200k_5pct_30yr"
url = "https://www.chase.com/personal/mortgage/education/financing-a-home/loan-amortization"
notes = "Chase consumer-education sample schedule. HALF_UP payment rounding. Rows 1-3 match exactly; final row drifts."

[expected]
monthly_payment = "1073.64"
