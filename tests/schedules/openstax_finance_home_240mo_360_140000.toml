# Worked example from OpenStax "Principles of Finance" (CC BY 4.0),
# section 8.3 "Loan Amortization" — home mortgage example.
#
# Textbook: $140,000 at 3.6% APR, 20 years, monthly payment $819.16.
# Row 1: interest $420.00, principal $399.16, balance $139,600.84.
# Library reproduces all values exactly with default rounding.

[loan]
principal = "140000.00"
annual_rate = "3.6"
term_months = 240
day_count = "30/360"
payment_rounding = "ROUND_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "US"
label = "openstax_finance_8_3_home"
url = "https://openstax.org/books/principles-finance/pages/8-3-loan-amortization"
notes = "OpenStax Principles of Finance (CC BY 4.0). Both ROUND_UP and HALF_UP give the same payment for this loan."

[expected]
monthly_payment = "819.16"
