# Worked example from LibreTexts "Business Math" by J. Olivier (CC BY-NC-SA),
# section 13.03 "Amortization Schedules" — Tamara's dishwasher loan.
#
# Loan: $895.94 at 5.9% APR (monthly compounding) for 6 months.
# Textbook publishes the full schedule and total interest of $15.48.
#
# Library agrees on:
#   - Monthly payment $151.90
#   - Row 1 (interest $4.41, principal $147.49, balance $748.45)
#   - Total interest $15.48
#
# Library DIVERGES from the textbook on rows 2-5 by one cent each because
# the textbook carries full unrounded balance precision between rows ("retain
# the decimals for future calculations") while the library rounds the balance
# each month. The textbook also uses a final payment equal to the regular
# $151.90 with adjusted-cents reconciliation, while the library lets the
# final payment differ to land balance at exactly zero.
#
# CSV is header-only — only the monthly_payment is validated against the
# textbook. The row-level divergence is a known capability gap for the
# library: it does not currently support "carry full precision" amortization.

[loan]
principal = "895.94"
annual_rate = "5.9"
term_months = 6
day_count = "30/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "CA"
label = "libretexts_olivier_dishwasher"
url = "https://math.libretexts.org/Bookshelves/Applied_Mathematics/Business_Math_(Olivier)/13:_Understanding_Amortization_and_its_Applications/13.03:_Amortization_Schedules"
notes = "Open textbook (CC BY-NC-SA). Carry-full-precision rounding causes 1-cent drift in rows 2-5 vs library's round-each-balance algorithm."

[expected]
monthly_payment = "151.90"
