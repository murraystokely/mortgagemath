# Worked example from Pima Open Press "Topics in Mathematics" section 6.4
# "Amortized Loans" — Example 6, 30-year spreadsheet illustration.
#
# Textbook: $160,000 at 4.4% APR, 30 years, monthly payment $801.22.
# Reports balance at payment 100 = $134,139.52, balance at payment 240
# = $77,668.70, total interest over loan life = $128,437.30.
#
# Library reproduces the monthly payment exactly. Row-level cumulative
# balance and interest drift slightly (1 cent at payment 100, 7 cents
# at payment 240, 10 cents on total interest), consistent with the
# textbook using a slightly different precision convention. Header-only
# CSV; only the monthly payment is validated here.

[loan]
principal = "160000.00"
annual_rate = "4.4"
term_months = 360
day_count = "30/360"
payment_rounding = "ROUND_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "US"
label = "pima_topics_math_6_4_160k_44pct_30yr"
url = "https://pimaopen.pressbooks.pub/topicsinmathematics/chapter/6-4-amortized-loans/"
notes = "Pima Open Press (CC license). Monthly payment matches; cumulative columns drift by single-digit cents. Header-only CSV."

[expected]
monthly_payment = "801.22"
