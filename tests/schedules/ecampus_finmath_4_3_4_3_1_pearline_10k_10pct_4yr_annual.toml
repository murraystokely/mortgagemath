# eCampus Ontario *Mathematics of Finance* (CC-BY-NC-SA 4.0), §4.3
# Example 4.3.1: "Pearline's office-supply loan."
#
# Worked example: $10,000 loan at 10% effective annual rate, 4 annual
# end-of-year payments. The textbook publishes the full 4-row
# amortization schedule:
#
#   Pmt | Amount    | Interest  | Principal | Balance
#   ----+-----------+-----------+-----------+-----------
#    1  | $3,154.71 | $1,000.00 | $2,154.71 | $7,845.29
#    2  | $3,154.71 |   $784.53 | $2,370.18 | $5,475.11
#    3  | $3,154.71 |   $547.51 | $2,607.20 | $2,867.91
#    4  | $3,154.70 |   $286.79 | $2,867.91 |     $0.00
#
# The final row's payment is $3,154.70 (one cent less) — the textbook
# explicitly handles the trueup so the balance lands at exactly $0.
# Library reproduces every cell exactly under
# Compounding.ANNUAL + PaymentFrequency.ANNUAL + ROUND_HALF_UP.

[loan]
principal = "10000.00"
annual_rate = "10"
term_months = 48
day_count = "30/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"
compounding = "annual"
payment_frequency = "annual"

[source]
kind = "textbook"
country = "CA"
license = "CC-BY-NC-SA-4.0"
short_label = "eCampus §4.3 Pearline"
bib_key = "ecampus_finmath_4_3"
bib_title = "eCampus §4.3 (Pearline / Erika / Johnetta)"
citation = "eCampus Ontario. *Mathematics of Finance*, §4.3 \"Loan amortization: formula approach\" (Example 4.3.1 Pearline; Exercises 2 Erika and 3 Johnetta). Pressbooks (CC-BY-NC-SA 4.0), 2023. <https://ecampusontario.pressbooks.pub/financemath/chapter/4-3-loan-amortization-formula-approach/>"
url = "https://ecampusontario.pressbooks.pub/financemath/chapter/4-3-loan-amortization-formula-approach/"
notes = "Annual-cadence + annual-compounding fixture with full 4-row published schedule. Source explicitly publishes the final-row trueup at $3,154.70."

[expected]
periodic_payment = "3154.71"
