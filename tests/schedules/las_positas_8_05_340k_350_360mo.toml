# Las Positas "Math for Liberal Arts" 8.05 example 2 — 30-year mortgage.
#
# Textbook: $340,000 at 3.5% APR, 30 years, monthly payment $1,526.76,
# total interest paid $209,633.60 over loan life.
#
# Library matches the payment exactly under ROUND_UP. Cumulative
# total_interest differs by ~$5 (library $209,628.57 vs textbook
# $209,633.60), so we validate only the monthly payment and row 1.

[loan]
principal = "340000.00"
annual_rate = "3.5"
term_months = 360
day_count = "30/360"
payment_rounding = "ROUND_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "US"
label = "las_positas_8_05_ex2"
url = "https://math.libretexts.org/Courses/Las_Positas_College/Math_for_Liberal_Arts/08:_Consumer_Mathematics/8.05:_Amortized_Loans"
notes = "LibreTexts CC. Cumulative total interest column drifts $5 over 30 years; payment and row 1 agree exactly."

[expected]
monthly_payment = "1526.76"
