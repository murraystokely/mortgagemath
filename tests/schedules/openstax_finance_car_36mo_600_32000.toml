# Worked example from OpenStax "Principles of Finance" (CC BY 4.0),
# section 8.3 "Loan Amortization" — auto loan example.
#
# Textbook: $32,000 at 6% APR, 3 years, monthly payment "approximately
# $973.50". Row 1: interest $160.00, principal $813.50, balance
# $31,186.50.
#
# Library reproduces all values exactly with HALF_UP payment rounding.

[loan]
principal = "32000.00"
annual_rate = "6"
term_months = 36
day_count = "30/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "US"
label = "openstax_finance_8_3_car"
url = "https://openstax.org/books/principles-finance/pages/8-3-loan-amortization"
notes = "OpenStax Principles of Finance (CC BY 4.0). HALF_UP rounding. Textbook says 'approximately $973.50'; library reproduces exactly."

[expected]
monthly_payment = "973.50"
