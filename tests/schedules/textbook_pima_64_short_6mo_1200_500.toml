# Worked example from Pima Open Press "Topics in Mathematics" section 6.4
# "Amortized Loans" — short-term illustrative loan with full schedule.
#
# Textbook: $500 at 12% APR, 6 monthly payments of $86.27.
# Library reproduces the payment ($86.27 with HALF_UP) and rows 1-5
# exactly. Row 6 differs because the textbook lets the schedule end
# with a $0.03 residual balance ($86.27 last payment, $0.03 left over),
# while the library adjusts the final payment to $86.30 to land balance
# at exactly $0.00. CSV therefore contains rows 1-5 only.

[loan]
principal = "500.00"
annual_rate = "12"
term_months = 6
day_count = "30/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"

[source]
kind = "textbook"
country = "US"
label = "pima_topics_math_6_4_ex5"
url = "https://pimaopen.pressbooks.pub/topicsinmathematics/chapter/6-4-amortized-loans/"
notes = "Pima Open Press (CC license). Full table published. Library and textbook diverge only on row 6 because the library closes balance to zero with an adjusted final payment ($86.30) while the textbook accepts a $0.03 residual."

[expected]
monthly_payment = "86.27"
