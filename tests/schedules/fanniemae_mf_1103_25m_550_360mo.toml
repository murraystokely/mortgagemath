# Worked example from the Fannie Mae Multifamily Selling and Servicing
# Guide, Part III, Chapter 11, Section 1103 "Actual Amortization
# Calculation" (effective April 3, 2026).
#
# The section computes a hypothetical actual/360 fixed-rate Mortgage Loan
# as the input for SARM Loan amortization. Published values:
#
#   - Mortgage Loan amount: $25,000,000
#   - Gross Note Rate: 5.500%
#   - Amortization period: 30 years (360 monthly installments)
#   - Loan term: 10 years (the SARM term)
#   - Issue date: December 1, 2018
#   - First loan payment: January 1, 2019
#   - Debt service constant: 6.8134680%
#   - Aggregate principal amortization over 120 payments: $4,114,494.17
#   - Fixed monthly principal installment: $34,287.45
#
# The library reproduces:
#   - Implied monthly P&I $141,947.25 (= $25M × 6.8134680% / 12) — the
#     standard closed-form annuity formula; Fannie Mae does not bump
#     the rate by 365/360.
#   - Implied balance after payment 120: $20,885,505.83
#     (= $25,000,000 - $4,114,494.17 aggregate principal). This anchors
#     the day-counted Actual/360 schedule with full-precision balance
#     tracking; period 1 covers December 2018 (31 days, the issue-date
#     month), and `loan.start_date` is set accordingly.

[loan]
principal = "25000000.00"
annual_rate = "5.5"
term_months = 120
amortization_period_months = 360
day_count = "actual/360"
payment_rounding = "ROUND_HALF_UP"
interest_rounding = "ROUND_HALF_UP"
start_date = "2018-12-01"

[source]
kind = "gse_guide"
country = "US"
license = "public domain"
short_label = "FNMA §1103"
bib_key = "fanniemae_mf_1103"
bib_title = "FNMA §1103"
citation = "Federal National Mortgage Association. *Multifamily Selling and Servicing Guide*, §1103 \"Actual/360 Tier 2 SARM Loan Amortization Calculation.\" Effective 2026-04-03. <https://mfguide.fanniemae.com/node/5286>"
url = "https://mfguide.fanniemae.com/node/5286"
notes = "Fannie Mae Multifamily Selling and Servicing Guide §1103 (eff. 2026-04-03). Tier 2 SARM worked example. Validates Actual/360 monthly_payment and the day-counted schedule's cumulative balance after 120 payments."

[expected]
monthly_payment = "141947.25"
balloon_at_term = "20885505.83"
# Balloon = unpaid principal balance at the end of the 120-month SARM
# term, equal to $25,000,000 - $4,114,494.17 (Fannie Mae §1103 published
# aggregate principal amortization). Per Fannie Mae's §1103 worked
# example, the borrower makes 120 monthly payments of $141,947.25 plus
# this balloon at term.
