# Read the Docs configuration for mortgagemath.
# Schema: https://docs.readthedocs.com/platform/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.13"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/sphinx/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf
  - epub
